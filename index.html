<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LCK 경기 일정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container py-4">
      <header class="header mb-3">
        <h1 class="fw-bold">LCK 경기 일정</h1>
        <p id="statusText" class="status"></p>
      </header>

      <section aria-label="팀 필터" class="team-filter-section shadow-sm">
        <h2 class="mb-3">팀별 보기</h2>
        <div id="teamButtons" class="team-grid"></div>
      </section>

      <section aria-label="일정 목록" class="schedule-section shadow-sm">
        <div class="section-title-row">
          <h2 id="listTitle" class="mb-0">전체 일정</h2>
          <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm ghost-button" type="button">필터 초기화</button>
        </div>

        <ul id="scheduleList" class="schedule-list"></ul>

        <div class="actions">
          <button id="loadMoreBtn" class="btn btn-primary primary-button" type="button">더보기</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
